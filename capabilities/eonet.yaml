aid: nasa-gov:capability:eonet
name: Natural Event Tracking
description: Retrieve curated natural events on Earth - wildfires, storms, volcanoes, sea ice, drought, earthquakes, floods and more.
api: nasa-gov:eonet
operations:
- id: getEvents
  method: GET
  path: /events
- id: getCategories
  method: GET
  path: /categories
- id: getSources
  method: GET
  path: /sources
- id: getLayers
  method: GET
  path: /layers
- id: getMagnitudes
  method: GET
  path: /magnitudes
authentication:
  method: none
