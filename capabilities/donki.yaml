aid: nasa-gov:capability:donki
name: Space Weather Monitoring
description: Retrieve space weather events including CMEs, geomagnetic storms, solar flares, and related phenomena from NASA's DONKI.
api: nasa-gov:donki
operations:
- id: getCME
  method: GET
  path: /DONKI/CME
- id: getGST
  method: GET
  path: /DONKI/GST
- id: getIPS
  method: GET
  path: /DONKI/IPS
- id: getFLR
  method: GET
  path: /DONKI/FLR
- id: getSEP
  method: GET
  path: /DONKI/SEP
- id: getMPC
  method: GET
  path: /DONKI/MPC
- id: getRBE
  method: GET
  path: /DONKI/RBE
- id: getHSS
  method: GET
  path: /DONKI/HSS
- id: getNotifications
  method: GET
  path: /DONKI/notifications
authentication:
  method: api-key
  parameter: api_key
  location: query
