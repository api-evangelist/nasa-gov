aid: nasa-gov:capability:techtransfer
name: NASA Technology Transfer Search
description: Search NASA patents, software, and Spinoff publications.
api: nasa-gov:techtransfer
operations:
- id: searchPatents
  method: GET
  path: /patent
- id: searchIssuedPatents
  method: GET
  path: /patent/issued
- id: searchSoftware
  method: GET
  path: /software
- id: searchSpinoff
  method: GET
  path: /spinoff
authentication:
  method: api-key
  parameter: api_key
  location: query
