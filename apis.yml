apis:
- aid: nasa-gov:apod
  name: NASA Astronomy Picture of the Day (APOD)
  tags:
  - Astronomy
  - Imagery
  - Space
  - NASA
  humanURL: https://api.nasa.gov/
  baseURL: https://api.nasa.gov/planetary/apod
  properties:
  - url: https://api.nasa.gov/
    type: Documentation
  - url: https://github.com/nasa/apod-api
    type: SourceCode
  - url: openapi/apod-openapi.yml
    type: OpenAPI
  - url: json-schema/apod-schema.json
    type: JSONSchema
  - url: capabilities/apod.yaml
    type: NaftikoCapability
  description: One of the most popular NASA websites, exposed as a JSON API. Returns the picture (or video)
