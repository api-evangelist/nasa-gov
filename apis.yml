- aid: nasa-gov:image-video-library
  name: NASA Image and Video Library API
  tags:
  - Imagery
  - Video
  - Media
  - NASA
  humanURL: https://images.nasa.gov/docs/images.nasa.gov_api_docs.pdf
  baseURL: https://images-api.nasa.gov
