    date, start_date/end_date ranges, count for random selections, and thumbs for video thumbnails.
- aid: nasa-gov:asteroids-neows
  name: NASA Asteroids NeoWs (Near Earth Object Web Service)
  tags:
  - Asteroids
  - Astronomy
  - Near Earth Objects
  - NASA
  humanURL: https://api.nasa.gov/
  baseURL: https://api.nasa.gov/neo/rest/v1
  properties:
  - url: https://api.nasa.gov/
    type: Documentation
  - url: https://github.com/SpaceRocks/NeoWs
    type: SourceCode
  - url: openapi/asteroids-neows-openapi.yml
    type: OpenAPI
  - url: capabilities/asteroids-neows.yaml
    type: NaftikoCapability
  description: RESTful web service for near earth Asteroid information. Lets you search for asteroids by closest
    approach date, lookup a specific asteroid by NASA JPL small body ID, and browse the overall dataset.
    Endpoints include /feed, /neo/{id}, and /neo/browse.
- aid: nasa-gov:donki
  name: NASA DONKI Space Weather API
  tags:
  - Space Weather
  - Heliophysics
  - Solar
  - NASA
  humanURL: https://ccmc.gsfc.nasa.gov/tools/DONKI/
  baseURL: https://api.nasa.gov/DONKI
  properties:
  - url: https://ccmc.gsfc.nasa.gov/tools/DONKI/
    type: Documentation
  - url: openapi/donki-openapi.yml
    type: OpenAPI
  - url: capabilities/donki.yaml
    type: NaftikoCapability
  description: Space Weather Database Of Notifications, Knowledge, Information (DONKI) — a comprehensive
    on-line tool for space weather forecasters, scientists, and the general public. Exposes coronal mass ejections,
    geomagnetic storms, interplanetary shocks, solar flares, solar energetic particles, magnetopause crossings,
    radiation belt enhancements, and high-speed streams.
- aid: nasa-gov:earth
  name: NASA Earth Imagery API
  tags:
  - Earth
  - Imagery
  - Landsat
  - Remote Sensing
  - NASA
  humanURL: https://api.nasa.gov/
  baseURL: https://api.nasa.gov/planetary/earth
  properties:
  - url: https://api.nasa.gov/
    type: Documentation
  - url: openapi/earth-openapi.yml
    type: OpenAPI
  - url: capabilities/earth.yaml
    type: NaftikoCapability
  description: Unlock the significant public investment in earth observation data. Returns Landsat 8 imagery
    for a given latitude/longitude and date plus assets/metadata. Useful for deforestation monitoring, natural
    disaster damage assessment, and other Earth surface change detection.
- aid: nasa-gov:eonet
  name: NASA EONET (Earth Observatory Natural Event Tracker)
  tags:
  - Earth
  - Natural Events
  - Disasters
  - Earth Observatory
  - NASA
  humanURL: https://eonet.gsfc.nasa.gov/docs/v3
  baseURL: https://eonet.gsfc.nasa.gov/api/v3
  properties:
  - url: https://eonet.gsfc.nasa.gov/docs/v3
    type: Documentation
  - url: openapi/eonet-openapi.yml
    type: OpenAPI
  - url: capabilities/eonet.yaml
    type: NaftikoCapability
  description: Continuously updated, curated source of natural events occurring on Earth — wildfires, severe
    storms, volcanoes, sea/lake ice, drought, dust/haze, earthquakes, floods, landslides, manmade events,
    snow, temperature extremes, and water color. Returns events, categories, layers, sources, and magnitudes.
- aid: nasa-gov:epic
  name: NASA EPIC (Earth Polychromatic Imaging Camera)
  tags:
  - Earth
  - Imagery
  - DSCOVR
  - NASA
  humanURL: https://epic.gsfc.nasa.gov/about/api
  baseURL: https://api.nasa.gov/EPIC
  properties:
  - url: https://epic.gsfc.nasa.gov/about/api
    type: Documentation
  - url: openapi/epic-openapi.yml
    type: OpenAPI
  - url: capabilities/epic.yaml
    type: NaftikoCapability
  description: The Earth Polychromatic Imaging Camera (EPIC) instrument aboard the DSCOVR satellite provides
    full-disc imagery of the Earth. Returns natural and enhanced color image metadata with centroid coordinates,
    spacecraft position, sun position, and lunar position. Both /natural and /enhanced collections supported.
- aid: nasa-gov:exoplanet
  name: NASA Exoplanet Archive API
  tags:
  - Exoplanets
  - Astronomy
  - Astrophysics
  - NASA
  humanURL: https://exoplanetarchive.ipac.caltech.edu/docs/TAP/usingTAP.html
  baseURL: https://exoplanetarchive.ipac.caltech.edu/TAP
  properties:
  - url: https://exoplanetarchive.ipac.caltech.edu/docs/TAP/usingTAP.html
    type: Documentation
  - url: openapi/exoplanet-openapi.yml
    type: OpenAPI
  - url: capabilities/exoplanet.yaml
    type: NaftikoCapability
  description: Programmatic access to NASA's Exoplanet Archive — confirmed planets, planetary candidates,
    Kepler/K2/TESS objects of interest, microlensing events, and direct imaging detections. Uses the IPAC
    Table Access Protocol (TAP) with ADQL queries returning CSV, JSON, VOTable, or IPAC ASCII.
- aid: nasa-gov:insight
  name: NASA InSight Mars Weather Service API
  tags:
  - Mars
  - Weather
  - InSight
  - Planetary Science
  - NASA
  humanURL: https://mars.nasa.gov/insight/weather/
  baseURL: https://api.nasa.gov/insight_weather
  properties:
  - url: https://mars.nasa.gov/insight/weather/
    type: Documentation
  - url: openapi/insight-openapi.yml
    type: OpenAPI
  - url: capabilities/insight.yaml
    type: NaftikoCapability
  description: Per-Sol summary data for each of the last seven available Sols (Martian days) of weather at
    Elysium Planitia, measured by the InSight lander. Reports atmospheric temperature, wind speed and direction,
    and atmospheric pressure. Note - InSight ended operations in December 2022; data is historical.
- aid: nasa-gov:mars-rover-photos
  name: NASA Mars Rover Photos API
  tags:
  - Mars
  - Rovers
  - Imagery
  - Planetary Science
  - NASA
  humanURL: https://api.nasa.gov/
  baseURL: https://api.nasa.gov/mars-photos/api/v1
  properties:
  - url: https://api.nasa.gov/
    type: Documentation
  - url: https://github.com/chrisccerami/mars-photo-api
    type: SourceCode
  - url: openapi/mars-rover-photos-openapi.yml
    type: OpenAPI
  - url: capabilities/mars-rover-photos.yaml
    type: NaftikoCapability
  description: Image data gathered by NASA's Curiosity, Opportunity, Spirit, and Perseverance rovers on Mars.
