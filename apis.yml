description: NASA Open APIs is the National Aeronautics and Space Administration's unified, public developer
  portal exposing space, earth science, planetary, heliophysics, and bioscience datasets at api.nasa.gov.
  A single API key issued through api.data.gov authenticates the family of APIs including APOD, Asteroids
  NeoWs, DONKI, Earth, EONET, EPIC, Exoplanet Archive, InSight, Mars Rover Photos, NASA Image and Video
  Library, TechPort, TechTransfer, SSD/CNEOS, Satellite Situation Center, GeneLab, TLE, and the Vesta/Moon/Mars
  Trek WMTS services. Together with 617+ open-source repositories on github.com/nasa they represent one of
  the most comprehensive open federal API surfaces in the world. As a US federal civilian agency NASA's data
  and software products are generally in the public domain, supporting a global ecosystem of researchers,
  educators, developers, and citizen scientists.
