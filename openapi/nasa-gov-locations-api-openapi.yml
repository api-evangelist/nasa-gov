openapi: 3.0.3
info:
  title: NASA Astronomy Picture of the Day (APOD) Album Locations API
  description: 'One of the most popular NASA websites, exposed as a JSON API. Returns the Astronomy Picture of the Day with

    title, explanation, image URL, HD URL, optional copyright, and media type. Supports single date, date ranges,

    random counts, and video thumbnails.

    '
  version: '1.0'
  contact:
    name: NASA Open APIs
    url: https://api.nasa.gov/
  license:
    name: US Government Work (Public Domain)
    url: https://www.nasa.gov/multimedia/guidelines/index.html
servers:
- url: https://api.nasa.gov
  description: NASA Open API gateway via api.data.gov
security:
- ApiKeyAuth: []
tags:
- name: Locations
paths:
  /locations:
    get:
      summary: Get Spacecraft Locations
      operationId: getLocations
      tags:
      - Locations
      parameters:
      - name: observatories
        in: query
        schema:
          type: string
      - name: startTime
        in: query
        schema:
          type: string
      - name: endTime
        in: query
        schema:
          type: string
      - name: coords
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Spacecraft coordinate locations across the requested time range.
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: query
      name: api_key
