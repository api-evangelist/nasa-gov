openapi: 3.0.3
info:
  title: NASA Astronomy Picture of the Day (APOD) Album Rovers API
  description: 'One of the most popular NASA websites, exposed as a JSON API. Returns the Astronomy Picture of the Day with

    title, explanation, image URL, HD URL, optional copyright, and media type. Supports single date, date ranges,

    random counts, and video thumbnails.

    '
  version: '1.0'
  contact:
    name: NASA Open APIs
    url: https://api.nasa.gov/
  license:
    name: US Government Work (Public Domain)
    url: https://www.nasa.gov/multimedia/guidelines/index.html
servers:
- url: https://api.nasa.gov
  description: NASA Open API gateway via api.data.gov
security:
- ApiKeyAuth: []
tags:
- name: Rovers
paths:
  /rovers:
    get:
      summary: List Mars Rovers
      operationId: listRovers
      tags:
      - Rovers
      parameters:
      - $ref: '#/components/parameters/ApiKey'
      responses:
        '200':
          description: List of rovers and their mission manifests.
components:
  parameters:
    ApiKey:
      name: api_key
      in: query
      required: true
      schema:
        type: string
        default: DEMO_KEY
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: query
      name: api_key
